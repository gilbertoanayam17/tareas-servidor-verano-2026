<!doctype html>
<html lang="es" data-bs-theme="dark">
    <head>
        <title>Contacto · Gilberto Anaya Mercado</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <!-- Fuentes -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <!-- Estilos -->
        <link rel="stylesheet" href="/styles/estilos.css" />
    </head>

    <body>
        <!-- Navbar -->
        <header>
            <nav class="barra">
                <a href="/" class="barra-logo">GAM</a>
                <div class="barra-links">
                    <a href="/#sobre-mi">Sobre mí</a>
                    <a href="/contacto">Contacto</a>
                </div>
            </nav>
        </header>

        <main>
            <section class="contacto">
                <!-- Columna izquierda: info -->
                <div class="contacto-info">
                    <div class="etiqueta">Contacto</div>
                    <h1 class="titulo-grande titulo-xl">Mándame un correo</h1>
                    <p class="texto">
                        Si necesitas contactarme para cualquier cosa,
                        puedes llenar el siguiente formulario.
                    </p>

                    <div class="linea"></div>

                </div>

                <!-- Columna derecha: formulario (el servidor procesa el POST) -->
                <form id="formContacto" class="formulario" action="/contacto" method="POST">
                    <div class="campo-grupo">
                        <label class="subtitulo" for="nombre">Nombre *</label>
                        <input
                            class="campo"
                            type="text"
                            id="nombre"
                            name="nombre"
                            placeholder="Tu nombre"
                            minlength="2"
                            required
                        />
                    </div>

                    <div class="campo-grupo">
                        <label class="subtitulo" for="email"
                            >Correo electrónico *</label
                        >
                        <input
                            class="campo"
                            type="email"
                            id="email"
                            name="email"
                            placeholder="ejemplo@mail.com"
                            required
                        />
                    </div>

                    <div class="campo-grupo">
                        <label class="subtitulo" for="asunto">Asunto</label>
                        <input
                            class="campo"
                            type="text"
                            id="asunto"
                            name="asunto"
                            placeholder="¿Cúal es el asunto de tu mensaje?"
                        />
                    </div>

                    <div class="campo-grupo">
                        <label class="subtitulo" for="mensaje">Mensaje *</label>
                        <textarea
                            class="campo"
                            id="mensaje"
                            name="mensaje"
                            placeholder="Escribe tu mensaje en este recuadro..."
                            minlength="10"
                            required
                        ></textarea>
                    </div>

                    <button class="boton" type="submit">
                        Enviar mensaje
                    </button>
                </form>
            </section>
        </main>

        <!-- Validación del formulario: avisa los errores en un alert -->
        <script>
            const formContacto = document.getElementById('formContacto');

            formContacto.addEventListener('submit', function (evento) {
                const nombre = document.getElementById('nombre').value.trim();
                const email = document.getElementById('email').value.trim();
                const mensaje = document.getElementById('mensaje').value.trim();

                const errores = [];

                if (nombre.length < 2) {
                    errores.push('El nombre debe tener al menos 2 caracteres.');
                }
                if (!email.includes('@')) {
                    errores.push('El correo electrónico debe contener una arroba (@).');
                }
                if (mensaje.length < 10) {
                    errores.push('El mensaje debe tener al menos 10 caracteres.');
                }

                if (errores.length > 0) {
                    evento.preventDefault();
                    alert('Formulario inválido:\n\n' + errores.join('\n'));
                }
            });
        </script>

        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
