<!doctype html>
<html lang="es" data-bs-theme="dark">
    <head>
        <title>Mensaje enviado · Gilberto Anaya Mercado</title>
        <meta charset="utf-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1" />

        <!-- Bootstrap CSS v5.3.8 -->
        <link
            href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
            rel="stylesheet"
            integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
            crossorigin="anonymous"
        />

        <!-- Fuentes -->
        <link rel="preconnect" href="https://fonts.googleapis.com" />
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
        <link
            href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,500;0,600;1,500&family=JetBrains+Mono:wght@400;500&family=Inter:wght@400;500&display=swap"
            rel="stylesheet"
        />

        <!-- Estilos -->
        <link rel="stylesheet" href="/styles/estilos.css" />
    </head>

    <body>
        <!-- Navbar -->
        <header>
            <nav class="barra">
                <a href="/" class="barra-logo">GAM</a>
                <div class="barra-links">
                    <a href="/#sobre-mi">Sobre mí</a>
                    <a href="/contacto">Contacto</a>
                </div>
            </nav>
        </header>

        <!-- Mensaje de enviado -->
        <main>
            <section class="enviado">
                <div class="enviado-icono">✓</div>
                <div class="etiqueta">Mensaje enviado</div>
                <h1 class="titulo-grande titulo-xl">¡Gracias por contactarme!</h1>
                <p class="texto">
                    Tu mensaje se envió correctamente. Te responderé al correo
                    que ingresaste en cuanto lo vea, saludos.
                </p>
                <a href="/" class="boton-volver">Volver al inicio</a>
            </section>
        </main>

        <!-- Bootstrap JavaScript Bundle (includes Popper) -->
        <script
            src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
            integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
            crossorigin="anonymous"
        ></script>
    </body>
</html>
